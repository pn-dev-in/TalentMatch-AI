# config.yaml
app:
  title: "AI Resume Screener"
  max_upload_size_mb: 10

skills:
  custom_skills:
    - "data science"
    - "cloud computing"
    - "agile methodology"
    - "project management"

models:
  semantic_model: "all-MiniLM-L6-v2"
  tfidf_max_features: 5000
  tfidf_ngram_range: [1, 2]

matching:
  top_k_default: 10
  similarity_threshold: 0.3   # minimum score to show

paths:
  data_dir: "./data"
  results_dir: "./data/results"